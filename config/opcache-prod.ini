# Configuration OPcache optimisée pour Symfony en production
# À ajouter dans php.ini ou dans un fichier .ini séparé

[opcache]
; Active OPcache
opcache.enable=1
opcache.enable_cli=1

; Mémoire allouée à OPcache (128 MB)
opcache.memory_consumption=128

; Nombre maximum de clés dans la table de hachage
opcache.max_accelerated_files=20000

; Pourcentage de mémoire utilisée avant de forcer la libération
opcache.max_wasted_percentage=5

; Vérifie les timestamps des fichiers toutes les N secondes (0 = jamais en prod)
opcache.revalidate_freq=0

; Valide les permissions des fichiers
opcache.validate_permission=1

; Empêche la vérification des timestamps en production
opcache.validate_timestamps=0

; Active l'optimisation des chaînes de caractères
opcache.interned_strings_buffer=16

; Active l'optimisation du cache de fichiers
opcache.fast_shutdown=1

; Précharge les fichiers Symfony (PHP 7.4+)
opcache.preload=/path/to/your/app/config/preload.php
opcache.preload_user=www-data

; Optimisations avancées
opcache.enable_file_override=1
opcache.optimization_level=0x7FFEBFFF